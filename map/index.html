<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Camp Shenandoah Map</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: -apple-system, system-ui, sans-serif; }
    #map { width: 100%; height: 100%; background: #2d5016; cursor: crosshair; }
    .coord-display {
      position: absolute; bottom: 24px; left: 12px; z-index: 1000;
      background: rgba(0,0,0,.7); color: white; padding: 6px 10px;
      border-radius: 6px; font-size: 13px; font-variant-numeric: tabular-nums;
      pointer-events: none; opacity: 0; transition: opacity .15s;
    }
    .coord-display.visible { opacity: 1; }
    .locate-btn {
      position: absolute; bottom: 24px; right: 12px; z-index: 1000;
      width: 44px; height: 44px; border-radius: 50%;
      background: white; border: 2px solid rgba(0,0,0,.2);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,.3);
    }
    .locate-btn svg { width: 22px; height: 22px; }
    .locate-btn.active svg { fill: #2563eb; }
    .landmark-popup { font-size: 14px; font-weight: 600; }
    .landmark-popup .coords { font-size: 11px; font-weight: 400; color: #666; margin-top: 2px; }
    .user-marker {
      width: 18px; height: 18px; border-radius: 50%;
      background: #2563eb; border: 3px solid white;
      box-shadow: 0 0 8px rgba(37,99,235,.6);
    }
    .leaflet-control-zoom { margin-top: 12px !important; margin-right: 12px !important; }
    .draw-btn {
      position: absolute; top: 12px; right: 12px; z-index: 1000;
      width: 44px; height: 44px; border-radius: 50%;
      background: white; border: 2px solid rgba(0,0,0,.2);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,.3);
    }
    .draw-btn svg { width: 20px; height: 20px; }
    .draw-btn.active { background: #fbbf24; border-color: #f59e0b; }
    .draw-toolbar {
      position: absolute; top: 64px; right: 12px; z-index: 1000;
      display: none; flex-direction: column; gap: 6px;
    }
    .draw-toolbar.visible { display: flex; }
    .draw-toolbar button {
      background: white; border: 2px solid rgba(0,0,0,.2); border-radius: 8px;
      padding: 6px 12px; font-size: 13px; cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,.3); white-space: nowrap;
    }
    .draw-toolbar button:hover { background: #f3f4f6; }
    .draw-toolbar button.danger { color: #dc2626; }
  </style>
</head>
<body>
  <div id="coordDisplay" class="coord-display"></div>
  <button class="draw-btn" id="drawBtn" title="Draw trails">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
    </svg>
  </button>
  <div class="draw-toolbar" id="drawToolbar">
    <button id="undoTrailBtn">Undo last trail</button>
    <button id="exportTrailBtn">Export trails</button>
    <button id="clearTrailBtn" class="danger">Clear all</button>
  </div>
  <div id="map"></div>
  <button class="locate-btn" id="locateBtn" title="Show my location">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0013 3.06V1h-2v2.06A8.994 8.994 0 003.06 11H1v2h2.06A8.994 8.994 0 0011 20.94V23h2v-2.06A8.994 8.994 0 0020.94 13H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/>
    </svg>
  </button>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
